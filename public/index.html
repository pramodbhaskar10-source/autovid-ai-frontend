<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0F0F0F" />
    <meta name="description" content="AutoVid Pro - Create viral videos up to 20 minutes with AI motion graphics. FacelessReels alternative with 4K export." />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <title>AutoVid Pro - AI Video Automation Studio | 20min Videos + Motion Graphics</title>
    
    <style>
      body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #0F0F0F;
      }
      
      /* Custom scrollbar for dark theme */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1A1A1A;
      }
      ::-webkit-scrollbar-thumb {
        background: #262626;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #7C3AED;
      }
      
      /* Range slider styling */
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        background: transparent;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-track {
        background: #262626;
        height: 6px;
        border-radius: 3px;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        background: #7C3AED;
        height: 16px;
        width: 16px;
        border-radius: 50%;
        margin-top: -5px;
      }
      input[type="range"]::-moz-range-track {
        background: #262626;
        height: 6px;
        border-radius: 3px;
      }
      input[type="range"]::-moz-range-thumb {
        background: #7C3AED;
        height: 16px;
        width: 16px;
        border-radius: 50%;
        border: none;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run AutoVid Pro.</noscript>
    <div id="root"></div>
    
    <!-- Razorpay Checkout - Required for payments -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </body>
</html>
